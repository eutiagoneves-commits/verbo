<!DOCTYPE html>
<html>
<head>
    <title>Verbo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #121213;
            color: white;
            text-align: center;
        }

        .menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #1a1a1b;
            border-bottom: 1px solid #333;
        }

        .titulo {
            font-size: 28px;
            font-weight: bold;
        }

        .menu a {
            text-decoration: none;
            color: white;
            background-color: #3a3a3c;
            padding: 8px 15px;
            border-radius: 5px;
            margin-left: 10px;
        }

        .menu a:hover {
            background-color: #565758;
        }

        .topo {
            margin-top: 20px;
        }

        input {
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px;
            font-size: 16px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            background-color: #538d4e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #6aaa64;
        }

        button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }

        .mensagem {
            margin-top: 20px;
            font-size: 22px;
        }

        .grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .linha {
            display: flex;
            margin-bottom: 5px;
        }

        .letra {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .green { background-color: #6aaa64; }
        .gold { background-color: #c9b458; }
        .gray { background-color: #3a3a3c; }
    </style>
</head>
<body>

    <div class="menu">
        <div class="titulo">🎮 VERBO</div>
        <div>
            <a href="/">🏠 Início</a>
            <a href="/reset">🔄 Reiniciar</a>
        </div>
    </div>

    <div class="topo">
        <form method="post">
            <input type="text" name="chute" maxlength="5" required>
            <button type="submit" {% if fim %}disabled{% endif %}>Enviar</button>
        </form>
    </div>

    {% if mensagem %}
        <div class="mensagem">{{ mensagem }}</div>
    {% endif %}

    <div class="grid">
        {% for tentativa in tentativas %}
            <div class="linha">
                {% for letra, cor in tentativa %}
                    <div class="letra {{ cor }}">{{ letra }}</div>
                {% endfor %}
            </div>
        {% endfor %}
    </div>

</body>
</html>
